services:
  app:
    image: luisalejandro/luisalejandro.org:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/home/luisalejandro-org/app
      - ~/.npm:/home/luisalejandro-org/.npm
      - ~/.cache/yarn:/home/luisalejandro-org/.cache/yarn
    env_file:
      - .env
    ports:
      - "3000:3000"
