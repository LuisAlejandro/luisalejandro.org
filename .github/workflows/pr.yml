name: Pull Request

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened
    branches:
      - develop

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Restoring node_modules cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Set environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          echo "PROJECT_NAME=luisalejandro-org" >> $GITHUB_ENV
          echo "COSMIC_READ_KEY=${{ secrets.COSMIC_READ_KEY }}" >> .env
          echo "COSMIC_BUCKET_SLUG=${{ secrets.COSMIC_BUCKET_SLUG }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Building docker image
        uses: docker/build-push-action@v7
        with:
          tags: luisalejandro/luisalejandro.org:latest
          file: Dockerfile
          context: .
          build-args: |
            UID=${{ env.UID }}
            GID=${{ env.GID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          load: true

      - name: Building project
        run: |
          make dependencies build_production

      - name: Tear down Docker
        if: always()
        run: make down

  # >>> rosey-maintainer:ci-quality BEGIN
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semgrep scan
        run: |
          BASELINE="${{ github.event.pull_request.base.sha }}"
          semgrep scan \
            --config p/ci \
            --config p/javascript \
            --baseline-commit "${BASELINE}" \
            --metrics=off \
            --error
  # <<< rosey-maintainer:ci-quality END
