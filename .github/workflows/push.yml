name: Push

on:
  push:
    branches:
      - master
      - develop
      - "release/**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Restore npm cache
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            */node_modules
            */*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Set environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          echo "COSMIC_READ_KEY=${{ secrets.COSMIC_READ_KEY }}" >> .env
          echo "COSMIC_BUCKET_SLUG=${{ secrets.COSMIC_BUCKET_SLUG }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Building docker image
        uses: docker/build-push-action@v7
        with:
          tags: luisalejandro/luisalejandro.org:latest
          file: Dockerfile
          context: .
          build-args: |
            UID=${{ env.UID }}
            GID=${{ env.GID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          load: true

      - name: Building project
        run: |
          make image
          make dependencies
          make build
  release-gate:
    name: Release Gate
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Confirm all release checks passed
        run: |
          echo "Release gate passed for ${{ github.ref_name }}"
