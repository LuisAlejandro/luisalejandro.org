name: Publish Release

on:
  release:
    types: [published]

concurrency:
  group: publish-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify-release-tag:
    name: Verify release tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare npm cache directory
        run: mkdir -p ~/.npm

      - name: Restore npm cache
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            */node_modules
            */*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Set environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          echo "PROJECT_NAME=luisalejandro-org" >> $GITHUB_ENV

      - name: Prepare CI environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

          echo "COSMIC_READ_KEY=${{ secrets.COSMIC_READ_KEY }}" >> .env
          echo "COSMIC_BUCKET_SLUG=${{ secrets.COSMIC_BUCKET_SLUG }}" >> .env

      - name: Build Docker image
        run: make image

      - name: Install dependencies in container
        run: make dependencies

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Tear down Docker
        if: always()
        run: make down
