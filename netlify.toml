# Netlify build config for luisalejandro.org
# Full env reference: .env.example (set secrets in Netlify UI, not here)

[build]
  command = "npm run build"
  # Netlify Next.js runtime manages publish output; kept for documentation.
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Netlify sets NODE_ENV=production which skips devDependencies.
  # The build script needs @typescript/native (devDep) for type-checking.
  NPM_FLAGS = "--include=dev"

# Next.js runtime adapter (OpenNext). Pinned to v5 to use modern Netlify
# Functions v2 and avoid the AWS Lambda 4KB env var limit of the legacy v4
# plugin. Remove the UI-installed plugin in Netlify site settings so this
# repo-pinned version takes precedence.
# Ref: https://developers.netlify.com/guides/migrating-to-the-modern-netlify-functions/
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Build-time env vars (configure in Netlify site settings):
# - COSMIC_BUCKET_SLUG, COSMIC_READ_KEY — blog, portfolio, case-study SSG
# - SENTRY_AUTH_TOKEN — production source map upload
# - NEXT_PUBLIC_* and runtime secrets as needed for routes built at deploy time
