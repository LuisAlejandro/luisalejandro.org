[bumpversion]
current_version = 3.2.6
commit = True
tag = True
tag_name = {new_version}

[bumpversion:file:package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:README.md]
search = Current version: {current_version}
replace = Current version: {new_version}

[bumpversion:file:public/.well-known/mcp/server-card.json]
search = "title": "Luis Alejandro — Read-only Agent API",
	"version": "{current_version}"
replace = "title": "Luis Alejandro — Read-only Agent API",
	"version": "{new_version}"
